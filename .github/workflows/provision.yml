# Maakt automatisch een Vercel-project aan (en triggert de eerste deploy)
# voor elk cookbook met `deploy: true` en runtime node/python-serverless
# dat nog geen project heeft. Idempotent: bestaande projecten worden overgeslagen.
#
# Vereist het repo-secret VERCEL_TOKEN (team-scoped Vercel-token).

name: Provision Vercel projects

on:
  push:
    branches: [main]
    paths:
      - "cookbooks/**/cookbook.yaml"
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps (yaml parser)
        working-directory: index
        run: npm ci
      - name: Provision missing Vercel projects
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: node .github/scripts/provision.mjs
